name: Release

# Builds the Windows installer and attaches it to a GitHub Release whenever a
# version tag (e.g. v1.0.0) is pushed. The installer lives in the Release —
# never in the git repo — so the repository stays small.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist

      - name: Publish installer to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*Setup*.exe
          fail_on_unmatched_files: true
