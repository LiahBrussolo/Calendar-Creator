<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Calendar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 24 24" class="logo" aria-hidden="true">
        <rect x="3" y="4.5" width="18" height="16" rx="3.2" />
        <line x1="3" y1="9" x2="21" y2="9" />
        <line x1="8" y1="2.5" x2="8" y2="6.5" />
        <line x1="16" y1="2.5" x2="16" y2="6.5" />
        <circle cx="8" cy="13" r="1.1" class="dot" />
        <circle cx="12" cy="13" r="1.1" class="dot" />
        <circle cx="16" cy="13" r="1.1" class="dot we" />
        <circle cx="8" cy="16.6" r="1.1" class="dot" />
        <circle cx="12" cy="16.6" r="1.1" class="dot we" />
        <circle cx="16" cy="16.6" r="1.1" class="dot we" />
      </svg>
      <span>Calendar</span>
    </div>
    <button id="theme" class="icon-btn" aria-label="Switch theme" title="Switch light / dark">
      <svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5Z" /></svg>
      <svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4.2" />
        <g class="rays"><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="7" y2="7"/><line x1="17" y1="17" x2="18.8" y2="18.8"/><line x1="5.2" y1="18.8" x2="7" y2="17"/><line x1="17" y1="7" x2="18.8" y2="5.2"/></g>
      </svg>
    </button>
  </header>

  <main>
    <section class="card">
      <div class="seg seg-3" id="mode">
        <button class="seg-btn active" data-mode="year">Year</button>
        <button class="seg-btn" data-mode="range">Date range</button>
        <button class="seg-btn" data-mode="schedule">Weekly Schedule</button>
      </div>

      <div class="pane" id="year-pane">
        <label for="year">Year</label>
        <input id="year" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="2026" />
        <div class="err" id="year-err"></div>
      </div>

      <div class="pane hidden" id="range-pane">
        <div class="row">
          <div class="col">
            <label>From</label>
            <div class="datefield" id="from-field"></div>
          </div>
          <span class="arrow">→</span>
          <div class="col">
            <label>To</label>
            <div class="datefield df-right" id="to-field"></div>
          </div>
        </div>
        <div class="range-foot">
          <div class="err" id="range-err"></div>
          <button type="button" id="range-clear" class="link-clear hidden">Clear dates</button>
        </div>
      </div>

      <div class="pane hidden" id="schedule-pane">
        <div class="sched-date">
          <div class="sched-date-top">
            <label>Start date (Monday) <span class="opt">optional</span></label>
            <button type="button" id="sched-date-clear" class="link-clear hidden">Clear</button>
          </div>
          <div class="datefield" id="sched-date-field"></div>
        </div>

        <div class="subseg" id="sched-mode">
          <button class="subseg-btn active" data-smode="time">By time</button>
          <button class="subseg-btn" data-smode="dayparts">By part of day</button>
        </div>

        <div id="sched-time-cfg">
          <div class="cfg-row">
            <label>Time format</label>
            <div class="mini-seg" id="time-format">
              <button class="mini-btn active" data-fmt="24h">24-hour</button>
              <button class="mini-btn" data-fmt="12h">12-hour</button>
            </div>
          </div>
          <div class="cfg-row">
            <label for="incr-value">A row every</label>
            <div class="incr">
              <input id="incr-value" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" value="1" />
              <select id="incr-unit">
                <option value="hours">hours</option>
                <option value="minutes">minutes</option>
              </select>
            </div>
          </div>
        </div>

        <div id="sched-parts-cfg" class="hidden">
          <p class="hint">Pick a start and end time for any of these — the rest fill with 4 untitled rows.</p>
          <div class="parts" id="parts-list"></div>
        </div>

        <div class="err" id="sched-err"></div>
      </div>

      <div class="field">
        <label for="lang-input">Language <span class="opt">optional</span></label>
        <div class="combo" id="combo">
          <input id="lang-input" type="text" autocomplete="off" spellcheck="false" placeholder="English" role="combobox" aria-expanded="false" aria-controls="lang-list" />
          <button id="lang-clear" class="combo-clear hidden" aria-label="Reset to English" title="Reset to English">×</button>
          <svg class="combo-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" /></svg>
          <div id="lang-list" class="combo-list hidden" role="listbox"></div>
        </div>
      </div>
    </section>

    <section class="card outputs">
      <div id="calendar-outputs">
      <div class="out-group">
        <div class="out-head"><span class="tag xlsx">XLSX</span><h3>Excel</h3></div>
        <button class="dl" data-type="excel-view">
          <svg viewBox="0 0 24 24" class="dl-ico" aria-hidden="true"><rect x="3.5" y="4" width="17" height="16" rx="2.5"/><line x1="9" y1="4" x2="9" y2="20"/><line x1="3.5" y1="9.3" x2="20.5" y2="9.3"/><line x1="3.5" y1="14.6" x2="20.5" y2="14.6"/></svg>
          <span class="dl-txt"><strong>Calendar View</strong><em>One month per column</em></span>
          <span class="dl-go" aria-hidden="true"><svg class="dl-arrow" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
        </button>
        <button class="dl" data-type="excel-list">
          <svg viewBox="0 0 24 24" class="dl-ico" aria-hidden="true"><line x1="9" y1="6.5" x2="20" y2="6.5"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="17.5" x2="20" y2="17.5"/><circle cx="4.6" cy="6.5" r="1.3"/><circle cx="4.6" cy="12" r="1.3"/><circle cx="4.6" cy="17.5" r="1.3"/></svg>
          <span class="dl-txt"><strong>List</strong><em>All months in a single column view</em></span>
          <span class="dl-go" aria-hidden="true"><svg class="dl-arrow" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
        </button>
      </div>

      <div class="out-group">
        <div class="out-head"><span class="tag pdf">PDF</span><h3>PDF</h3></div>
        <button class="dl" data-type="pdf-year">
          <svg viewBox="0 0 24 24" class="dl-ico" aria-hidden="true"><rect x="3.5" y="4" width="17" height="16" rx="2.5"/><rect x="6.4" y="7" width="3.4" height="3.4" rx="0.7"/><rect x="10.8" y="7" width="3.4" height="3.4" rx="0.7"/><rect x="15.2" y="7" width="2.4" height="3.4" rx="0.7"/><rect x="6.4" y="11.4" width="3.4" height="3.4" rx="0.7"/><rect x="10.8" y="11.4" width="3.4" height="3.4" rx="0.7"/></svg>
          <span class="dl-txt"><strong>Calendar</strong><em>Full visual of the year on 1 page</em></span>
          <span class="dl-go" aria-hidden="true"><svg class="dl-arrow" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
        </button>
        <button class="dl" data-type="pdf-month">
          <svg viewBox="0 0 24 24" class="dl-ico" aria-hidden="true"><rect x="4.5" y="3.5" width="15" height="17" rx="2.5"/><line x1="4.5" y1="8" x2="19.5" y2="8"/><line x1="8" y1="11.5" x2="16" y2="11.5"/><line x1="8" y1="14.5" x2="16" y2="14.5"/><line x1="8" y1="17.5" x2="13" y2="17.5"/></svg>
          <span class="dl-txt"><strong>Monthly View</strong><em>One month per page</em></span>
          <span class="dl-go" aria-hidden="true"><svg class="dl-arrow" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
        </button>
      </div>
      </div>

      <div id="schedule-outputs" class="hidden">
        <div class="out-group">
          <div class="out-head"><span class="tag xlsx">XLSX</span><h3>Excel</h3></div>
          <button class="dl" data-type="schedule-excel">
            <svg viewBox="0 0 24 24" class="dl-ico" aria-hidden="true"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><line x1="3.5" y1="9.3" x2="20.5" y2="9.3"/><line x1="9.7" y1="9.3" x2="9.7" y2="19.5"/><line x1="15" y1="9.3" x2="15" y2="19.5"/></svg>
            <span class="dl-txt"><strong>Download</strong></span>
            <span class="dl-go" aria-hidden="true"><svg class="dl-arrow" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
          </button>
        </div>
        <div class="out-group">
          <div class="out-head"><span class="tag pdf">PDF</span><h3>PDF</h3></div>
          <button class="dl" data-type="schedule-pdf">
            <svg viewBox="0 0 24 24" class="dl-ico" aria-hidden="true"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/><line x1="3.5" y1="9.3" x2="20.5" y2="9.3"/><line x1="9.7" y1="9.3" x2="9.7" y2="19.5"/><line x1="15" y1="9.3" x2="15" y2="19.5"/></svg>
            <span class="dl-txt"><strong>Download</strong></span>
            <span class="dl-go" aria-hidden="true"><svg class="dl-arrow" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden" role="status"></div>

  <script src="languages.js"></script>
  <script src="datepicker.js"></script>
  <script src="timepicker.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
